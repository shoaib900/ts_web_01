<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid & animations</title>
    <style>
        *{
            margin: 0;
        }
        .container{
            height: 100vh;
            width: 100%;
            background-color: goldenrod;
        }
        .grid{
            /* background-color: white; */
            height: 80vh;
            display: grid;
            /* grid-template-columns:100px 200px; */
            grid-template-columns: 1fr 4fr;
            row-gap: 5px;
            column-gap: 5px;
        }
        .items{
            background-color: red;
        }
        .item1{
            grid-column-start: 1;
            grid-column-end: span 2;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="grid">
            <div class="items item1">items</div>
            <div class="items">items</div>
            <div class="items">items</div>
            <div class="items">items</div>
            <div class="items">items</div>
        </div>

    </div>
    
</body>
</html>
